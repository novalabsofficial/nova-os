<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- v10.x: viewport-fit=cover extends the page edge-to-edge under the notch /
       home indicator (no letterbox gap); no user zoom on phones. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Nova OS</title>
  <!-- v7.1: PWA manifest + theme color. Lets Chromebooks (and any Chromium
       browser) "install" the web app as a standalone-window experience —
       no install needed, runs from the browser engine that's already there. -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <!-- dark theme-color matches the OS shell (installed-app title bar + mobile
       browser chrome). Kept in sync with manifest.webmanifest theme_color. -->
  <meta name="theme-color" content="#07080f" />
  <meta name="description" content="A browser-based desktop OS with apps, widgets, AI integration, and cross-device sync." />
  <link rel="icon" type="image/png" href="/nova-icon.png" />
  <link rel="apple-touch-icon" href="/nova-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nova OS" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    /* 100dvh fills the *visible* viewport on phones (handles the dynamic
       address bar) instead of 100vh which can overshoot and leave gaps. */
    html, body, #root { width: 100%; height: 100vh; height: 100dvh; overflow: hidden; }
    body { background: #000; -webkit-touch-callout: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Boot-error reporter: if the app fails to start (e.g. inside a native
       WebView with no devtools), paint the actual error onto the screen instead
       of a silent black screen. Harmless on a normal boot. -->
  <script>
    (function () {
      function show(msg) {
        var el = document.getElementById('nova-boot-err');
        if (!el) {
          el = document.createElement('pre');
          el.id = 'nova-boot-err';
          el.style.cssText = 'position:fixed;inset:0;z-index:2147483647;margin:0;padding:16px;background:#0a0c16;color:#ff8a8a;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;word-break:break-word;overflow:auto;';
          (document.body || document.documentElement).appendChild(el);
        }
        el.textContent += msg + '\n\n';
      }
      // Only TAKE OVER the screen for a genuine boot failure (React never
      // mounted). Once the app is up (#root has content), a stray async error
      // must NOT blank the whole OS — just log it to the console. (A masked
      // post-boot "Script error." used to paint this opaque overlay over a
      // perfectly-running desktop — e.g. the gapi/CORS error on Tauri Linux.)
      function booted() { var r = document.getElementById('root'); return !!(r && r.childElementCount > 0); }
      window.addEventListener('error', function (e) {
        if (booted()) { try { console.error('[nova] post-boot error:', (e && e.message) || (e.error && e.error.message) || (e && e.error)); } catch (_) {} return; }
        show('JS error: ' + (e.message || (e.error && e.error.message) || e.error) + (e.filename ? ('\n@ ' + e.filename + ':' + e.lineno + ':' + e.colno) : '') + (e.error && e.error.stack ? ('\n' + e.error.stack) : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        if (booted()) { try { console.error('[nova] post-boot rejection:', e && e.reason); } catch (_) {} return; }
        var r = e.reason; show('Promise rejection: ' + ((r && (r.stack || r.message)) || r));
      });
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) show('Nova OS did not start: #root is still empty after 6s. If no error is shown above, the app bundle failed to load.');
      }, 6000);
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
