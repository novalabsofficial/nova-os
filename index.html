<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- v10.x: viewport-fit=cover extends the page edge-to-edge under the notch /
       home indicator (no letterbox gap); no user zoom on phones. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Nova OS</title>
  <!-- v7.1: PWA manifest + theme color. Lets Chromebooks (and any Chromium
       browser) "install" the web app as a standalone-window experience —
       no install needed, runs from the browser engine that's already there. -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <!-- dark theme-color matches the OS shell (installed-app title bar + mobile
       browser chrome). Kept in sync with manifest.webmanifest theme_color. -->
  <meta name="theme-color" content="#07080f" />
  <meta name="description" content="A browser-based desktop OS with apps, widgets, AI integration, and cross-device sync." />
  <link rel="icon" type="image/svg+xml" href="/nova-icon.svg" />
  <link rel="apple-touch-icon" href="/nova-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nova OS" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    /* 100dvh fills the *visible* viewport on phones (handles the dynamic
       address bar) instead of 100vh which can overshoot and leave gaps. */
    html, body, #root { width: 100%; height: 100vh; height: 100dvh; overflow: hidden; }
    body { background: #000; -webkit-touch-callout: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
