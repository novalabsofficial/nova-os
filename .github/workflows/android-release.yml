name: Android APK

# Builds the Capacitor Android app and attaches the APK to the GitHub Release
# whenever a version tag is pushed (same trigger as the desktop Tauri build), so
# `git push origin vX.Y.Z` produces both the desktop installers and the Android
# APK on one release — no local Android SDK needed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Brand the launcher icon
        continue-on-error: true
        run: |
          mkdir -p resources
          cp public/nova-icon.png resources/icon.png
          npx @capacitor/assets generate --android

      - name: Sync web build into Android
        run: npx cap sync android

      - name: Use a consistent debug signing key
        # Gradle's default debug build signs with ~/.android/debug.keystore. The
        # CI runner would otherwise generate a fresh random one per build, so each
        # APK would have a different signature and Android would refuse to update
        # in place ("App not installed"). Dropping our committed keystore here
        # gives every release the SAME signature -> updates install cleanly.
        run: |
          mkdir -p ~/.android
          cp ci/debug.keystore ~/.android/debug.keystore

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk nova-os.apk

      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          files: nova-os.apk
